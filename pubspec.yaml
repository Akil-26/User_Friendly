name: flutter_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.1.0
  flutter_bloc: ^8.1.6
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  sqflite: ^2.4.1
  path: ^1.9.0
  url_launcher: ^6.3.1
  equatable: ^2.0.5
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
  fonts:
    - family: Myfont
      fonts:
        - asset: fonts/BebasNeue-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon1.png"
  min_sdk_android: 21
  adaptive_icon_background: "#E8622A"